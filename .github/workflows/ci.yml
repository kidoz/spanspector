name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - name: Format
        run: just fmt-check
      - name: Clippy
        run: just clippy
      - name: Test
        run: just test
      - name: Doc
        run: just doc

  git-consumer:
    name: git-dependency smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      # Verify SpanSpector is consumable as a pinned git dependency at this commit,
      # the supported downstream mode while the crates are `publish = false`.
      - name: Build git consumer
        run: just git-consumer-smoke "file://${GITHUB_WORKSPACE}/.git" "${GITHUB_SHA}"
